manifest_version: 2

version:
  name: V1
  label: "Postgres Learning Studio v2.0"
  comment: "PostgreSQL benchmark and learning tool on SPCS. Gallery Compatible v3."

artifacts:
  readme: README.md
  setup_script: setup.sql
  default_streamlit: app_public.setup_ui
  container_services:
    images:
      - /POSTGRES_LEARNING_STUDIO_DB/APP_SCHEMA/POSTGRES_LEARNING_STUDIO_REPO/postgres-learning-studio:v3

privileges:
  - CREATE COMPUTE POOL:
      description: >
        Required to create a compute pool for the application container.
        The pool runs pgbench and the Flask Web UI for benchmark operations.
  - BIND SERVICE ENDPOINT:
      description: >
        Required to expose the Web UI as a public ingress
        endpoint, accessible via Snowflake-authenticated HTTPS.

references:
  - postgres_eai:
      label: "PostgreSQL External Access"
      description: >
        EAI for the application container to connect to PostgreSQL (port 5432)
        and run pgbench benchmarks. Network rules must allow TCP to the PG host.
      privileges:
        - USAGE
      object_type: EXTERNAL ACCESS INTEGRATION
      required_at_setup: false
      register_callback: app_setup.register_reference
      configuration_callback: app_setup.get_eai_configuration

configuration:
  log_level: INFO
  trace_level: ALWAYS
  grant_callback: app_setup.grant_callback
